name: monitor-news

on:
  schedule:
    - cron: '15 * * * *'   # toda hora aos :15min
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Insta_Supra
        uses: actions/checkout@v4

      - name: Check if PAT is configured
        id: pat_check
        env:
          PAT: ${{ secrets.GH_REPO_PAT }}
        run: |
          if [ -n "$PAT" ]; then
            echo "has_pat=true" >> $GITHUB_OUTPUT
            echo "[info] GH_REPO_PAT configurado — features completas habilitadas."
          else
            echo "has_pat=false" >> $GITHUB_OUTPUT
            echo "[info] GH_REPO_PAT ausente — vai rodar parcial (sem sync de blog nem auto-trigger publish)."
          fi

      - name: Checkout Site_FNDE (se PAT existe)
        if: steps.pat_check.outputs.has_pat == 'true'
        uses: actions/checkout@v4
        with:
          repository: VictorRamonOl/Site_Fnde
          path: ../Site_FNDE_repo
          token: ${{ secrets.GH_REPO_PAT }}
          fetch-depth: 1

      - name: Stage Site_FNDE em local esperado
        if: steps.pat_check.outputs.has_pat == 'true'
        run: |
          mkdir -p ../Site_FNDE
          rm -rf ../Site_FNDE
          mv ../Site_FNDE_repo ../Site_FNDE

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          pip install requests python-dotenv playwright
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          PYTHONIOENCODING: utf-8
        run: python -m scripts.news.monitor --limit 1

      - name: Commit Insta_Supra (state + queue)
        run: |
          git config user.name "supra-news-bot"
          git config user.email "actions@github.com"
          git add state/ content/news_queue/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem novidades pra commitar."
          else
            git commit -m "news: monitor $(date -u +%Y-%m-%d_%H%M)"
            git push
          fi

      - name: Commit Site_FNDE (blog entry, se PAT)
        if: steps.pat_check.outputs.has_pat == 'true'
        run: |
          cd ../Site_FNDE
          git config user.name "supra-news-bot"
          git config user.email "actions@github.com"
          git add src/data/news.ts 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem nova entrada de blog."
          else
            git commit -m "blog: news auto $(date -u +%Y-%m-%d_%H%M)"
            git remote set-url origin https://x-access-token:${{ secrets.GH_REPO_PAT }}@github.com/VictorRamonOl/Site_Fnde.git
            git push origin HEAD
          fi

      - name: Trigger publish (se PAT e fila tem item)
        if: steps.pat_check.outputs.has_pat == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_REPO_PAT }}
        run: |
          if ls content/news_queue/*/post.json 1>/dev/null 2>&1; then
            echo "Noticias na fila — disparando publish.yml..."
            gh workflow run publish.yml --repo VictorRamonOl/supra-instagram-bot
          else
            echo "Fila vazia — nao dispara publish."
          fi

      - name: Aviso final se sem PAT
        if: steps.pat_check.outputs.has_pat == 'false'
        run: |
          echo "::warning::Configure GH_REPO_PAT para habilitar sync com Site_FNDE e auto-disparo do publish.yml."
          echo "Por enquanto, noticias detectadas ficam em content/news_queue/ e publicam no proximo Mon/Wed/Fri."
