<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap');

  :root {
    --navy: #0d2645;
    --navy-dark: #061528;
    --gold: #d4af5a;
    --gold-soft: #b8954a;
    --cream: #f4ead5;
    --white: #ffffff;
  }

  body {
    width: 1080px;
    height: 1080px;
    background: radial-gradient(ellipse at top, #14315a 0%, var(--navy) 50%, var(--navy-dark) 100%);
    font-family: 'Inter', sans-serif;
    color: var(--white);
    position: relative;
    overflow: hidden;
  }

  /* Decorative top bar */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-soft) 100%);
  }

  /* Brand watermark - bottom right */
  .brand {
    position: absolute;
    bottom: 48px;
    right: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 10;
  }
  .brand-logo {
    width: 56px;
    height: 56px;
    border: 2px solid var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--gold);
    background: rgba(255,255,255,0.04);
  }
  .brand-text {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--gold);
  }
  .brand-text small {
    display: block;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    color: var(--cream);
    opacity: 0.7;
    margin-top: 2px;
  }

  /* Page number bottom left */
  .page-num {
    position: absolute;
    bottom: 56px;
    left: 64px;
    font-size: 14px;
    color: var(--cream);
    opacity: 0.5;
    letter-spacing: 3px;
    z-index: 10;
  }

  /* Main content container */
  .content {
    padding: 100px 80px 180px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 5;
  }

  /* === HOOK slide === */
  .slide-hook .content { justify-content: center; align-items: flex-start; }
  .slide-hook .label {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .slide-hook .label::before {
    content: '';
    display: inline-block;
    width: 36px;
    height: 2px;
    background: var(--gold);
    vertical-align: middle;
    margin-right: 18px;
    transform: translateY(-3px);
  }
  .slide-hook h1 {
    font-family: 'Playfair Display', serif;
    font-size: 110px;
    font-weight: 700;
    line-height: 1.0;
    margin-bottom: 36px;
    color: var(--white);
  }
  .slide-hook .subhead {
    font-size: 32px;
    line-height: 1.35;
    font-weight: 400;
    color: var(--cream);
    max-width: 820px;
  }

  /* === CONTENT slide === */
  .slide-content .kicker {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: inline-block;
    padding: 8px 16px;
    border: 1px solid var(--gold);
    border-radius: 4px;
  }
  .slide-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 68px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 40px;
    color: var(--white);
    max-width: 880px;
  }
  .slide-content .body {
    font-size: 30px;
    line-height: 1.55;
    font-weight: 400;
    color: var(--cream);
    max-width: 880px;
    white-space: pre-line;
  }

  /* === DATA/LIST slide === */
  .slide-data .kicker,
  .slide-list .kicker {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: inline-block;
    padding: 8px 16px;
    border: 1px solid var(--gold);
    border-radius: 4px;
  }
  .slide-data h2,
  .slide-list h2 {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 48px;
    color: var(--white);
    max-width: 880px;
  }
  .slide-data ul,
  .slide-list ul {
    list-style: none;
    counter-reset: item;
  }
  .slide-data li,
  .slide-list li {
    counter-increment: item;
    font-size: 30px;
    line-height: 1.4;
    color: var(--cream);
    padding: 18px 0 18px 76px;
    position: relative;
    border-bottom: 1px solid rgba(212, 175, 90, 0.18);
  }
  .slide-data li:last-child,
  .slide-list li:last-child { border-bottom: none; }
  .slide-data li::before,
  .slide-list li::before {
    content: counter(item, decimal-leading-zero);
    position: absolute;
    left: 0;
    top: 18px;
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  /* === COMPARISON slide === */
  .slide-comparison .kicker {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: inline-block;
    padding: 8px 16px;
    border: 1px solid var(--gold);
    border-radius: 4px;
  }
  .slide-comparison h2 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 40px;
    color: var(--white);
    max-width: 920px;
  }
  .columns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .col {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212, 175, 90, 0.3);
    border-radius: 8px;
    padding: 26px 22px;
  }
  .col-name {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(212, 175, 90, 0.3);
  }
  .col-row {
    font-size: 17px;
    color: var(--cream);
    padding: 10px 0;
    line-height: 1.4;
  }

  /* === CTA slide === */
  .slide-cta .content {
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .slide-cta h2 {
    font-family: 'Playfair Display', serif;
    font-size: 76px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 36px;
    color: var(--white);
    max-width: 900px;
  }
  .slide-cta .body {
    font-size: 30px;
    line-height: 1.5;
    color: var(--cream);
    max-width: 760px;
    margin-bottom: 60px;
    white-space: pre-line;
  }
  .slide-cta .handle {
    display: inline-block;
    padding: 20px 44px;
    background: var(--gold);
    color: var(--navy-dark);
    border-radius: 6px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* Subtle background ornament */
  .ornament {
    position: absolute;
    bottom: -200px;
    right: -200px;
    width: 700px;
    height: 700px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    opacity: 0.05;
    z-index: 1;
  }
  .ornament-2 {
    position: absolute;
    top: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    opacity: 0.04;
    z-index: 1;
  }
</style>
</head>
<body class="slide-{{TYPE}}">
  <div class="top-bar"></div>
  <div class="ornament"></div>
  <div class="ornament-2"></div>

  <div class="content">
    {{CONTENT_HTML}}
  </div>

  <div class="page-num">{{PAGE_LABEL}}</div>
  <div class="brand">
    <div class="brand-logo">SA</div>
    <div class="brand-text">SUPRA AM<small>SOLUÇÕES INTEGRADAS</small></div>
  </div>
</body>
</html>
